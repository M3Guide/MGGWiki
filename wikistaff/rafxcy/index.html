<html lang="en">
<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .staff-profile-page {
      max-width: 1000px;
      margin: 48px auto;
      padding: 0 24px 80px;
    }

    /* ── Back link ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #bbb;
      text-decoration: none;
      margin-bottom: 32px;
      transition: color 0.15s;
    }
    .back-link:hover { color: #b0ea20; text-decoration: none; }
    .back-link svg { flex-shrink: 0; }

    /* ── Profile header ── */
    .profile-header {
      display: flex;
      gap: 32px;
      align-items: flex-start;
      margin-bottom: 40px;
      padding-bottom: 36px;
      border-bottom: 1px solid #1e1e24;
    }

    .profile-portrait {
      flex-shrink: 0;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 2px solid #b0ea20;
      overflow: hidden;
      background: #111114;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .profile-portrait img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    .profile-portrait-initials {
      font-size: 2.2rem;
      font-weight: 800;
      color: #b0ea20;
    }

    .profile-meta { flex: 1; }

    .profile-eyebrow {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #b0ea20;
      margin-bottom: 4px;
    }
    .profile-name {
      font-size: 2.2rem;
      font-weight: 800;
      color: #ddd;
      line-height: 1.1;
      margin-bottom: 6px;
    }
    .profile-role {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 16px;
    }

    /* Optional badge (Image Provider etc.) */
    .profile-badge {
      display: inline-block;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: rgba(176,234,32,0.08);
      border: 1px solid rgba(176,234,32,0.25);
      color: #b0ea20;
      padding: 2px 8px;
      border-radius: 2px;
      margin-bottom: 16px;
    }

    /* Quote */
    .profile-quote {
      font-size: 0.85rem;
      color: #3d3d48;
      font-style: italic;
      border-left: 2px solid #222;
      padding-left: 12px;
      margin-bottom: 18px;
      line-height: 1.7;
    }

    /* Socials row */
    .profile-socials {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .social-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: #111114;
      border: 1px solid #222;
      border-radius: 2px;
      font-size: 0.75rem;
      color: #888;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
      font-family: 'Oxanium', sans-serif;
    }
    .social-chip:hover { border-color: #b0ea20; color: #eee; text-decoration: none; }
    .social-chip svg { flex-shrink: 0; }

    /* ── Bio section ── */
    .profile-bio {
      background: #111114;
      border-left: 3px solid #b0ea20;
      padding: 18px 22px;
      margin-bottom: 40px;
      font-size: 0.88rem;
      color: #bbb;
      line-height: 1.8;
    }
    .profile-bio p + p { margin-top: 10px; }

    /* ── Section label ── */
    .section-label {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .section-label-text {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #bbb;
      white-space: nowrap;
    }
    .section-label-line {
      flex: 1;
      height: 1px;
      background: #1e1e24;
    }

    /* ── Contributions grid ── */
    .contributions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 10px;
    }
    .contrib-card {
      background: #111114;
      border: 1px solid #1e1e24;
      border-top: 2px solid #1e1e24;
      border-radius: 2px;
      text-align: center;
      text-decoration: none;
      display: block;
      overflow: visible;
      transition: border-color 0.15s, transform 0.15s;
    }
    .contrib-card:hover {
      border-color: #b0ea20;
      border-top-color: #b0ea20;
      transform: translateY(-2px);
      text-decoration: none;
    }
    .contrib-img-wrap {
      width: 100%;
      aspect-ratio: 1;
      background: #0d0d10;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .contrib-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    .contrib-img {
      width: 82%;
      height: 82%;
      object-fit: contain;
      position: relative;
      z-index: 1;
    }
    .contrib-name {
      padding: 5px 6px 6px;
      font-size: 0.68rem;
      font-weight: 600;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.03em;
      border-top: 1px solid #1e1e24;
      font-family: 'Oxanium', sans-serif;
    }
    .contrib-card:hover .contrib-name { color: #eee; }

    .no-contributions {
      color: #333;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 32px 0;
    }

    /* ── Responsive ── */
    @media (max-width: 560px) {
      .profile-header { flex-direction: column; align-items: center; text-align: center; }
      .profile-quote { text-align: left; }
      .profile-socials { justify-content: center; }
      .profile-name { font-size: 1.7rem; }
    }
  </style>

  <script>
    /* Front matter values passed to JS */
    const STAFF_CONTRIBUTOR_COLUMN = "Wiki Author";
    const STAFF_USERNAME           = "RafXCy";
    const STAFF_MUTANT_ID          = "";
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQh2Z4QbBx5VxQgAwXOueCe3TKK9abQQ-XWVyf5tCGKg3pIxnjhJO6buOVhOO8pCuzYmwvr5dppYTgn/pub?output=csv";

    const geneIcons = { Cyber:"a", Necro:"b", Saber:"c", Zoomorph:"d", Galactic:"e", Mythic:"f", Neutral:"all" };

    function parseCSV(text) {
      const rows = []; let cur = [], field = "", inQ = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i], n = text[i+1];
        if (c==='"' && inQ && n==='"') { field+='"'; i++; }
        else if (c==='"') { inQ=!inQ; }
        else if (c===',' && !inQ) { cur.push(field); field=""; }
        else if ((c==='\n'||c==='\r') && !inQ) {
          if (field.length||cur.length) { cur.push(field); rows.push(cur); cur=[]; field=""; }
        } else field+=c;
      }
      if (field.length||cur.length) { cur.push(field); rows.push(cur); }
      return rows;
    }

    document.addEventListener("DOMContentLoaded", async () => {
      const grid = document.getElementById("contributions-grid");
      const count = document.getElementById("contrib-count");
      if (!grid) return;

      /* If no contributor_column is set in front matter, skip */
      if (!STAFF_CONTRIBUTOR_COLUMN || STAFF_CONTRIBUTOR_COLUMN === "") {
        grid.innerHTML = `<p class="no-contributions">No contributions tracked yet.</p>`;
        return;
      }

      try {
        const res  = await fetch(CSV_URL);
        const text = await res.text();
        const rows = parseCSV(text.trim());
        const headers = rows[0].map(h => h.trim());
        const all = rows.slice(1)
          .map(r => Object.fromEntries(headers.map((h,i) => [h, (r[i]||"").trim()])))
          .filter(m => m["Name"]);

        /* Match rows where the contributor column contains this staff member's username */
        const contributed = all.filter(m => {
          const cell = (m[STAFF_CONTRIBUTOR_COLUMN] || "").toLowerCase();
          return cell.includes(STAFF_USERNAME.toLowerCase());
        });

        if (count) count.textContent = contributed.length
          ? `${contributed.length} page${contributed.length !== 1 ? "s" : ""}`
          : "";

        if (!contributed.length) {
          grid.innerHTML = `<p class="no-contributions">No contributions tracked yet.</p>`;
          return;
        }

        grid.innerHTML = contributed.map(m => {
          const id   = (m["ID"]     || "").trim();
          const name = (m["Name"]   || "").trim();
          const g1   = (m["Gene 1"] || "").trim();
          const link = (m["Links"]  || "").trim();
          const iconSrc = `https://raw.githubusercontent.com/M3Guide/MGGImages/refs/heads/main/icons/${g1}/${id}.png`;
          return `<a class="contrib-card" href="/mutants/${link}/">
            <div class="contrib-img-wrap">
              <img class="contrib-bg" src="/MGGWiki/images/icon_bg.png" alt="">
              <img class="contrib-img" src="${iconSrc}" alt="${name}" loading="lazy"
                   onerror="this.src='/MGGWiki/images/placeholder.png'">
            </div>
            <div class="contrib-name">${name}</div>
          </a>`;
        }).join("");

      } catch(e) {
        grid.innerHTML = `<p class="no-contributions">Failed to load contributions.</p>`;
      }
    });
  </script>
