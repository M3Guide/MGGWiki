<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Origamix | Mutants: Genetic Gladiators Wiki</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="../../favicon.ico" type="image/ico">
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Navbar -->
  <link rel="stylesheet" href="/MGGWiki/assets/css/navbar.css">
  <script src="/MGGWiki/assets/js/navbar.js" defer></script>

  <!-- Wiki Styles -->
  <link rel="stylesheet" href="/MGGWiki/assets/css/wiki.css">

  <script>
    const mutantName = "Origamix";
  </script>
  <script src="/MGGWiki/assets/js/mutantLoader.js" defer></script>
</head>
<body>
  <header id="navbar-container"></header>
  <main class="wiki-layout">
    <section class="wiki-content">
      <h1 id="mutant-name" class="mutant-title">ad_14</h1>
      <h2>Overview</h2>
      <div id="mutant-overview-box" class="overview-box">
        <p id="mutant-overview">Loading...</p>
      </div>

      <!-- Biography -->
      <h2>Biography</h2>
      <div id="mutant-bio-box" class="bio-box">
        <p id="mutant-biography">Loading...</p>
      </div>

      <h2>How to Obtain</h2>
      <div id="mutant-obtain-box" class="obtain-box">
        <p id="mutant-obtain">Loading...</p>
      </div>

      <!-- Stats -->
      <h2 id="stats-header">
        <span>Stats</span>
        <div id="stats-toggle">
          <span id="toggle-base-label" class="active">Base</span>
          <label class="switch">
            <input type="checkbox" id="toggle-upgraded">
            <span class="slider"></span>
          </label>
          <span id="toggle-upgraded-label">Upgraded</span>
        </div>
      </h2>
      <div id="mutant-stats-box">
        <div class="stat-row">
          <div class="stat-box attack" data-gene="cyber" id="stat-attack1-box">
            <div class="stat-gene-stack">
              <img class="stat-gene-img" id="stat-gene-1">
              <img class="stat-gene-plus" src = "../../images/genes/AtkPlus.png">
              <img class="stat-gene-spread" src = "../../images/genes/Spread.png">
            </div> 
            <div class="stat-text">
              <div class="stat-attack" id="stat-attack1-name"></div>
              <div class="stat-value" id="stat-attack1-damage"></div>
            </div>
          </div>
          <div class="stat-box small">
            <img src = "../../images/stats/HP.png" class="stat-icon">
            <div class="stat-value" id="stat-hp"></div>
          </div>
        </div>
        <div class="stat-row">
          <div class="stat-box attack" data-gene="cyber" id="stat-attack2-box">
            <div class="stat-gene-stack">
              <img class="stat-gene-img" id="stat-gene-2">
              <img class="stat-gene-plus" src = "../../images/genes/AtkPlus.png">
              <img class="stat-gene-spread" src = "../../images/genes/Spread.png">
            </div> 
            <div class="stat-text">
              <div class="stat-attack" id="stat-attack2-name"></div>
              <div class="stat-value" id="stat-attack2-damage"></div>
            </div>
          </div>
          <div class="stat-box small">
            <img src = "../../images/stats/Speed.png" class="stat-icon">
            <div class="stat-value" id="stat-speed"></div>
          </div>
        </div>
        <div class="stat-row">
          <div class="stat-box small">
            <div id ="stat-ability-stack">
              <img id="stat-ability-img" class="stat-icon">
              <img id="stat-ability-plus" src = "../../images/ability/AbilityPlus.png">
            </div>
            
            <div class="stat-value" id="stat-ability"></div>
          </div>
          <div class="stat-box small">
            <img src = "../../images/stats/Credits.png" class="stat-icon">
            <div class="stat-value" id="stat-credits"></div>
          </div>
          <div class="stat-box small">
            <img src = "../../images/stats/Incubation.png" class="stat-icon">
            <div class="stat-value" id="stat-incubation"></div>
          </div>
        </div>
      </div>

      <!-- Versions Section -->
      <h2>Icons</h2>
      <div id="mutant-skins" class="gallery">
        <div class="version">
          <img src="../../images/placeholder.png" alt="Default">
          <span class="version-label">Default</span>
        </div>
      </div>

      <h2>Larvae</h2>
      <div id="mutant-larvae-box" class="gallery">
        <p id="mutant-larvae">Loading...</p>
      </div>
      <h2>References</h2>
      <div id="mutant-references-box" class="references-box">
        <p id="mutant-references">Loading...</p>
      </div>
    </section>
    
    <!-- RIGHT INFOBOX -->
    <aside class="infobox">
      <div class="infobox-header">
        <h2 id="mutant-name-box" class="mutant-name-box">Origamix</h2>
        <div id="skin-selector-wrapper">
            <button id="skin-left">‹</button>
            <div id="mutant-skin-selector" class="skin-selector"></div>
            <button id="skin-right">‹</button>
        </div>
        <div id="mutant-image-container">
          <img id="mutant-image">
        </div>
      </div>

      <table class="infobox-table">
        <tr>
          <th>Genes</th>
          <td id="mutant-genes"></td>
        </tr>
        <tr><th>Category</th><td id="mutant-category"></td></tr>
        <tr><th>Ability</th><td id="mutant-ability"></td></tr>
        <tr><th>Breedable?</th><td id="mutant-breedable"></td></tr>
        <tr><th>Bingo</th><td id="mutant-bingo"></td></tr>
      </table>
    </aside>

  </main>

</body>
</html>
